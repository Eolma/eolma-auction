server:
  port: 8083

spring:
  application:
    name: eolma-auction
  main:
    web-application-type: reactive

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/eolma_auction
    username: eolma
    password: eolma1234

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    root: INFO
    com.eolma.auction: DEBUG
    org.springframework.r2dbc: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
